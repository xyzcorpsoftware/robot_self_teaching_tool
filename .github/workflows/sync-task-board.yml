name: Sync Task Board

# Security: All user-controllable inputs (PR title, body) are passed via env vars.
# See: https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/

on:
  pull_request:
    types: [opened, closed]
    branches:
      - develop
      - 'release/**'
      - main
      - master

jobs:
  sync:
    # Skip if: PR was closed without merge (opened PRs and merged PRs always sync)
    if: >-
      github.event.action == 'opened' ||
      (github.event.action == 'closed' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    env:
      TASK_MGMT_PAT: ${{ secrets.TASK_MGMT_PAT }}
      TASK_MGMT_REPO: xyzcorpsoftware/task-management
      PR_BODY: ${{ github.event.pull_request.body }}
      PR_URL: ${{ github.event.pull_request.html_url }}
      PR_TITLE: ${{ github.event.pull_request.title }}
      PR_ACTION: ${{ github.event.action }}
      PR_MERGED: ${{ github.event.pull_request.merged }}
      PR_BASE: ${{ github.event.pull_request.base.ref }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      PR_AUTHOR: ${{ github.event.pull_request.user.login }}

    steps:
      - name: Check PAT
        run: |
          if [ -z "$TASK_MGMT_PAT" ]; then
            echo "::warning::TASK_MGMT_PAT secret is not set. Skipping task board sync."
            exit 0
          fi

      - name: Parse Task Sync section and dispatch
        run: |
          # --- Determine default action from branch + event ---
          if [ "$PR_ACTION" = "opened" ]; then
            DEFAULT_ACTION="comment"
            DEFAULT_COLUMN=""
            EVENT_DESC="PR opened to ${PR_BASE}"
          elif [ "$PR_MERGED" = "true" ]; then
            EVENT_DESC="merged to ${PR_BASE}"
            case "$PR_BASE" in
              develop)
                DEFAULT_ACTION="move"
                DEFAULT_COLUMN="qa"
                ;;
              release/*)
                DEFAULT_ACTION="move"
                DEFAULT_COLUMN="deploy-wait"
                ;;
              main|master)
                DEFAULT_ACTION="move"
                DEFAULT_COLUMN="done"
                ;;
              *)
                DEFAULT_ACTION="comment"
                DEFAULT_COLUMN=""
                ;;
            esac
          else
            echo "PR closed without merge. Skipping."
            exit 0
          fi

          echo "Default: action=${DEFAULT_ACTION}, column=${DEFAULT_COLUMN}, event=${EVENT_DESC}"

          # --- Dispatch helper ---
          dispatch() {
            local NUM="$1" COLUMN="$2" ACTION="$3" EVENT="$4"

            curl -sf -X POST \
              -H "Authorization: token ${TASK_MGMT_PAT}" \
              -H "Accept: application/vnd.github+v3+json" \
              "https://api.github.com/repos/${TASK_MGMT_REPO}/dispatches" \
              -d "$(jq -n \
                --arg issue_number "$NUM" \
                --arg target_column "$COLUMN" \
                --arg action "$ACTION" \
                --arg source_repo "$GITHUB_REPOSITORY" \
                --arg pr_url "$PR_URL" \
                --arg pr_title "$PR_TITLE" \
                --arg pr_event "$EVENT" \
                --arg pr_number "$PR_NUMBER" \
                --arg pr_author "$PR_AUTHOR" \
                '{
                  event_type: "task-board-sync",
                  client_payload: {
                    issue_number: ($issue_number | tonumber),
                    target_column: $target_column,
                    action: $action,
                    source_repo: $source_repo,
                    pr_url: $pr_url,
                    pr_title: $pr_title,
                    pr_event: $pr_event,
                    pr_number: ($pr_number | tonumber),
                    pr_author: $pr_author
                  }
                }')" && echo "  -> Dispatched" || echo "::warning::Failed to dispatch for #${NUM}"
          }

          # --- Extract Task Sync section ---
          # Parse from "## Task Sync" header to the next "## " header or EOF.
          # Bare TM# refs outside this section are intentionally ignored.
          #
          # Rationale: bare TM# refs are ambiguous (closing vs mere mention)
          # and previously caused unrelated issues to be auto-moved when the
          # ref appeared anywhere in the PR body. Scoping the parser to a
          # dedicated section eliminates this class of bug. Reference-only
          # issues can be mentioned freely elsewhere in the body — they are
          # ignored here. Manual column overrides go in PR COMMENTS via
          # pr-comment-commands.yml (e.g. "Done: TM#200").
          TASK_SYNC_BLOCK=$(echo "$PR_BODY" | awk '
            /^##[[:space:]]+Task[[:space:]]+Sync[[:space:]]*$/ { inside=1; next }
            inside && /^##[[:space:]]/ { inside=0 }
            inside { print }
          ')

          # Warn if keyword prefix was mistakenly placed inside the section.
          # Keywords belong in PR comments; the bare TM# will be dispatched
          # with the default (branch-based) column anyway.
          if echo "$TASK_SYNC_BLOCK" | grep -qiE '(Start|Review|Deploy|Done)[[:space:]]*:[[:space:]]*TM#'; then
            echo "::warning::Keyword prefix found inside Task Sync section. Post keywords (Start:/Review:/Deploy:/Done:) as PR COMMENTS instead. The bare TM# will use the default column."
          fi

          SYNC_NUMS=$(echo "$TASK_SYNC_BLOCK" | grep -oiE 'TM#[0-9]+' | grep -oE '[0-9]+' | sort -u || true)

          DISPATCH_COUNT=0
          MAX_DISPATCHES=5

          for NUM in $SYNC_NUMS; do
            DISPATCH_COUNT=$((DISPATCH_COUNT + 1))
            if [ "$DISPATCH_COUNT" -gt "$MAX_DISPATCHES" ]; then
              echo "::warning::Max ${MAX_DISPATCHES} TM references reached. Skipping remaining."
              break
            fi

            echo "Task Sync: issue #${NUM} -> action=${DEFAULT_ACTION}, column=${DEFAULT_COLUMN}"
            dispatch "$NUM" "$DEFAULT_COLUMN" "$DEFAULT_ACTION" "$EVENT_DESC"
          done

          # --- No TM# in Task Sync section: auto-create only on PR opened ---
          # cross-repo-sync.yml appends TM#NEW to the PR body on auto-create.
          # Since the Task Sync section is the LAST section of the template,
          # the appended TM# falls inside it and is picked up at merge time.
          if [ -z "$SYNC_NUMS" ]; then
            if [ "$PR_ACTION" = "opened" ]; then
              echo "No TM# in Task Sync section. Dispatching auto-create..."
              dispatch "0" "$DEFAULT_COLUMN" "auto-create" "$EVENT_DESC"
            else
              echo "No TM# in Task Sync section on merge. Skipping."
            fi
          fi
